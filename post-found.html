<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Found Item - YIC Lost & Found</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">
        <h1>YIC Lost & Found</h1>
        <p>Yanbu Industrial College</p>
    </div>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="report-lost.html">Report Lost</a></li>
            <li><a href="post-found.html" class="active">Post Found</a></li>
            <li><a href="dashboard.html">My Items</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>
</header>

<div class="form-container">
    <h2>🔍 Post Found Item</h2>

    <!-- Info notice -->
    <div style="background: #e0f0fa; border-radius: 12px; padding: 14px 16px; margin-bottom: 25px; font-size: 14px; color: #1a4a5f;">
        🙌 Thank you for being honest! The owner must describe the item correctly before you hand it over.
    </div>

    <form id="postFoundForm">

        <div class="form-group">
            <label for="itemTitle">Item Name *</label>
            <input type="text" id="itemTitle" placeholder="e.g. Red Umbrella" required>
        </div>

        <div class="form-group">
            <label for="category">Category *</label>
            <select id="category" required>
                <option value="">-- Select Category --</option>
                <option value="electronics">Electronics</option>
                <option value="bags">Bags & Luggage</option>
                <option value="clothing">Clothing</option>
                <option value="keys">Keys & Cards</option>
                <option value="accessories">Accessories</option>
                <option value="books">Books & Stationery</option>
                <option value="other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label for="location">Where Found *</label>
            <input type="text" id="location" placeholder="e.g. Building D, Floor 1 Hallway" required>
        </div>

        <div class="form-group">
            <label for="dateFound">Date Found *</label>
            <input type="date" id="dateFound" required>
        </div>

        <div class="form-group">
            <label for="description">Description *</label>
            <textarea id="description" placeholder="Describe the item. Do not include passwords or PINs." required></textarea>
        </div>

        <div class="form-group">
            <label for="heldAt">Where is the item now? *</label>
            <select id="heldAt" required>
                <option value="">-- Select --</option>
                <option value="self">With me (I am holding it)</option>
                <option value="security">Handed to Security Office</option>
                <option value="admin">Handed to College Admin</option>
                <option value="dept">Left at Department Office</option>
            </select>
        </div>

        <div class="form-group">
            <label for="contact">Your Contact Email *</label>
            <input type="email" id="contact" placeholder="your@yic.edu.sa" required>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-submit">Post Found Item</button>
            <a href="index.html" class="btn-cancel">Cancel</a>
        </div>

    </form>
</div>

<footer>
    <p>&copy; 2026 YIC Lost & Found Portal | CS381 Project</p>
</footer>

<script>
    document.getElementById('dateFound').max = new Date().toISOString().split('T')[0];

    document.getElementById('postFoundForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const title    = document.getElementById('itemTitle').value.trim();
        const category = document.getElementById('category').value;
        const location = document.getElementById('location').value.trim();
        const date     = document.getElementById('dateFound').value;
        const desc     = document.getElementById('description').value.trim();
        const heldAt   = document.getElementById('heldAt').value;
        const contact  = document.getElementById('contact').value.trim();

        if (!title || !category || !location || !date || !desc || !heldAt || !contact) {
            alert('Please fill in all required fields.');
            return;
        }

        // Get existing found items from localStorage
        const existing = JSON.parse(localStorage.getItem('foundItems')) || [];

        // Create new item
        const newItem = {
            id: Date.now(),
            title: title,
            category: category,
            location: location,
            date: new Date(date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
            description: desc,
            icon: getCategoryIcon(category),
            finder: JSON.parse(localStorage.getItem('currentUser'))?.name || 'Anonymous',
            contact: contact,
            heldAt: heldAt,
            type: 'found'
        };

        existing.push(newItem);
        localStorage.setItem('foundItems', JSON.stringify(existing));

        alert('✅ Found item posted successfully!');
        window.location.href = 'index.html';
    });

    function getCategoryIcon(category) {
        const icons = {
            electronics: '📱',
            bags: '🎒',
            clothing: '👕',
            keys: '🔑',
            accessories: '⌚',
            books: '📚',
            other: '📦'
        };
        return icons[category] || '📦';
    }
</script>

</body>
</html>
